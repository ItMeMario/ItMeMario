<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300">
  <defs>
    <!-- Pixel Cloud -->
    <g id="pixel-cloud" fill="#ffffff" stroke="#000" stroke-width="2">
      <path d="M 30,0 h40 v10 h20 v20 h10 v20 h-10 v10 h-90 v-10 h-10 v-20 h10 v-20 h20 v-10 z" />
    </g>

    <!-- Lumpy Bush (Type 1) -->
    <g id="bush-type1" stroke="#000" stroke-width="2">
      <path d="M 10,50 v -10 h 10 v -10 h 10 v -10 h 10 v -10 h 20 v 10 h 30 v 10 h 10 v 10 h 10 v 10 z" fill="#58d040" />
      <path d="M 12,48 v -8 h 10 v -10 h 10 v -10 h 10 v -10 h 18" fill="none" stroke="#a0f070" stroke-width="4" stroke-linecap="square"/>
      <path d="M 62,22 h 26" fill="none" stroke="#a0f070" stroke-width="4" stroke-linecap="square"/>
      <path fill="#288010" stroke="none" d="M 40,40 h 20 v 10 h -20 z M 80,30 h 10 v 20 h -10 z M 50,20 h 10 v 10 h -10 z" />
    </g>

    <!-- Tall Pill Bush -->
    <clipPath id="clip-tall">
      <path d="M 10,80 v -60 h 10 v -10 h 20 v 10 h 10 v 60 z" />
    </clipPath>
    <g id="bush-tall" stroke="#000" stroke-width="2">
      <path d="M 10,80 v -60 h 10 v -10 h 20 v 10 h 10 v 60 z" fill="#58d040" />
      <g clip-path="url(#clip-tall)" stroke="none">
        <rect x="10" y="10" width="4" height="70" fill="#a0f070" />
        <rect x="14" y="10" width="20" height="4" fill="#a0f070" />
        <path d="M -10,70 l 80,-40 M -10,50 l 80,-40 M -10,90 l 80,-40 M -10,110 l 80,-40" stroke="#288010" stroke-width="6" stroke-linecap="square" />
      </g>
      <path d="M 10,80 v -60 h 10 v -10 h 20 v 10 h 10 v 60 z" fill="none" />
    </g>

    <!-- Short Pill Bush -->
    <clipPath id="clip-short">
      <path d="M 10,50 v -30 h 10 v -10 h 20 v 10 h 10 v 30 z" />
    </clipPath>
    <g id="bush-short" stroke="#000" stroke-width="2">
      <path d="M 10,50 v -30 h 10 v -10 h 20 v 10 h 10 v 30 z" fill="#58d040" />
      <g clip-path="url(#clip-short)" stroke="none">
        <rect x="10" y="10" width="4" height="40" fill="#a0f070" />
        <rect x="14" y="10" width="20" height="4" fill="#a0f070" />
        <path d="M -10,40 l 80,-40 M -10,60 l 80,-40 M -10,80 l 80,-40" stroke="#288010" stroke-width="6" stroke-linecap="square" />
      </g>
      <path d="M 10,50 v -30 h 10 v -10 h 20 v 10 h 10 v 30 z" fill="none" />
    </g>

    <!-- Pixel Mountain -->
    <g id="mountain" fill="#4caf50" stroke="#000" stroke-width="2">
      <path d="M 150,0 h 20 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h10 v10 h-300 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 z" />
      <!-- Snow cap -->
      <path fill="#ffffff" stroke="#000" stroke-width="2" d="M 150,0 h 20 v10 h10 v10 h10 v10 h10 v10 h10 v10 h-10 v-10 h-10 v10 h-20 v-10 h-20 v10 h-10 v-10 h-10 v10 h-10 v-10 h10 v-10 h10 v-10 h10 v-10 h10 v-10 z" />
      <!-- Mountain detail lines -->
      <path d="M 160,20 v 130" stroke="#000" stroke-width="2" fill="none" opacity="0.3" />
    </g>

    <!-- Ground Pattern -->
    <pattern id="ground-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#e88c00"/>
      <!-- grass top -->
      <rect width="40" height="8" fill="#4caf50"/>
      <rect y="8" width="40" height="2" fill="#000"/>
      <!-- Dirt Details (like SMW) -->
      <rect x="0" y="24" width="40" height="2" fill="#000"/>
      <rect x="18" y="10" width="2" height="14" fill="#000"/>
      <rect x="38" y="26" width="2" height="14" fill="#000"/>
    </pattern>

    <!-- Elements -->
    <!-- Brick Block -->
    <g id="brick-block" stroke="#000" stroke-width="2">
      <rect x="0" y="0" width="32" height="32" fill="#c84c0c" />
      <path d="M 0,16 h 32 M 16,0 v 16 M 8,16 v 16 M 24,16 v 16" stroke="#000" stroke-width="2" />
      <path d="M 2,2 h 28 M 2,2 v 12 M 18,2 v 12" stroke="#f89838" stroke-width="2" fill="none" stroke-linecap="square"/>
    </g>

    <!-- Question Block -->
    <g id="question-block" stroke="#000" stroke-width="2">
      <rect x="0" y="0" width="32" height="32" fill="#fc9838" />
      <rect x="12" y="6" width="8" height="4" fill="#c84c0c" stroke="none" />
      <rect x="8" y="10" width="4" height="4" fill="#c84c0c" stroke="none" />
      <rect x="20" y="10" width="4" height="6" fill="#c84c0c" stroke="none" />
      <rect x="16" y="16" width="4" height="6" fill="#c84c0c" stroke="none" />
      <rect x="16" y="24" width="4" height="4" fill="#c84c0c" stroke="none" />
      <rect x="2" y="2" width="2" height="2" fill="#000" stroke="none" />
      <rect x="28" y="2" width="2" height="2" fill="#000" stroke="none" />
      <rect x="2" y="28" width="2" height="2" fill="#000" stroke="none" />
      <rect x="28" y="28" width="2" height="2" fill="#000" stroke="none" />
      <path d="M 2,2 h 26 v 2 h -24 v 24 h -2 z" fill="#ffcca0" stroke="none" />
    </g>

    <!-- Coin -->
    <g id="coin" stroke="#000" stroke-width="2">
      <rect x="6" y="0" width="12" height="28" rx="6" fill="#fce000" />
      <rect x="10" y="6" width="4" height="16" fill="#f89838" stroke="none" />
    </g>

    <!-- Pipe -->
    <g id="pipe" stroke="#000" stroke-width="2">
      <rect x="4" y="16" width="56" height="50" fill="#00a800" />
      <rect x="0" y="0" width="64" height="16" fill="#00a800" />
      <rect x="12" y="16" width="8" height="50" fill="#80d010" stroke="none" />
      <rect x="8" y="0" width="8" height="16" fill="#80d010" stroke="none" />
    </g>

    <!-- Piranha Plant -->
    <g id="piranha-plant">
      <!-- Stem -->
      <rect x="14" y="28" width="4" height="22" fill="#58d040" stroke="#000" stroke-width="2" />
      <rect x="16" y="28" width="2" height="22" fill="#288010" stroke="none" />
      
      <!-- Left Leaf -->
      <path d="M 14,40 C 0,38 -2,48 8,48 C 12,48 14,44 14,40 Z" fill="#58d040" stroke="#000" stroke-width="2" stroke-linejoin="round" />
      <path d="M 10,42 C 6,42 4,46 8,46" fill="none" stroke="#288010" stroke-width="2" />
      
      <!-- Right Leaf -->
      <path d="M 18,40 C 32,38 34,48 24,48 C 20,48 18,44 18,40 Z" fill="#58d040" stroke="#000" stroke-width="2" stroke-linejoin="round" />
      <path d="M 22,42 C 26,42 28,46 24,46" fill="none" stroke="#288010" stroke-width="2" />

      <!-- Head Base -->
      <path d="M 4,8 L 16,20 L 28,8 C 32,16 28,30 16,30 C 4,30 0,16 4,8 Z" fill="#d82800" stroke="#000" stroke-width="2" stroke-linejoin="round" />
      
      <!-- Lips -->
      <path d="M 2,4 L 16,18 L 30,4 L 26,0 L 16,10 L 6,0 Z" fill="#ffffff" stroke="#000" stroke-width="2" stroke-linejoin="round" />
      
      <!-- Spots -->
      <rect x="8" y="20" width="4" height="4" fill="#fff" stroke="none" />
      <rect x="20" y="20" width="4" height="4" fill="#fff" stroke="none" />
      <rect x="14" y="24" width="4" height="4" fill="#fff" stroke="none" />
      <rect x="4" y="14" width="3" height="3" fill="#fff" stroke="none" />
      <rect x="25" y="14" width="3" height="3" fill="#fff" stroke="none" />
    </g>

    <!-- Mushroom House -->
    <g id="mushroom-house" stroke="#000" stroke-width="2">
      <path d="M 20,60 v 40 h 60 v -40 z" fill="#f8d8b0" />
      <path d="M 40,70 v 30 h 20 v -30 z" fill="#c84c0c" />
      <circle cx="55" cy="85" r="2" fill="#000" stroke="none" />
      <path d="M 0,60 C 0,10 100,10 100,60 Z" fill="#d82800" />
      <circle cx="20" cy="40" r="10" fill="#fff" stroke="none" />
      <circle cx="50" cy="25" r="12" fill="#fff" stroke="none" />
      <circle cx="80" cy="40" r="10" fill="#fff" stroke="none" />
    </g>
  </defs>

  <style>
    @keyframes move1 {
      0% { transform: translate(1100px, 30px) scale(0.8); }
      100% { transform: translate(-200px, 30px) scale(0.8); }
    }
    .c1 { animation: move1 35s linear infinite; }
    
    @keyframes move2 {
      0% { transform: translate(1100px, 50px) scale(1.2); }
      100% { transform: translate(-200px, 50px) scale(1.2); }
    }
    .c2 { animation: move2 45s linear infinite; animation-delay: -15s; }
    
    @keyframes move3 {
      0% { transform: translate(1100px, 20px) scale(0.9); }
      100% { transform: translate(-200px, 20px) scale(0.9); }
    }
    .c3 { animation: move3 40s linear infinite; animation-delay: -25s; }
    
    @keyframes move4 {
      0% { transform: translate(1100px, 120px) scale(0.6); }
      100% { transform: translate(-200px, 120px) scale(0.6); }
    }
    .c4 { animation: move4 60s linear infinite; animation-delay: -5s; }
  </style>

  <!-- Sky background -->
  <rect x="0" y="0" width="1000" height="120" fill="#6ba4ff" />
  <rect x="0" y="120" width="1000" height="80" fill="#88baff" />
  <rect x="0" y="200" width="1000" height="50" fill="#a4ccff" />

  <!-- Animated Clouds -->
  <g class="c1"><use href="#pixel-cloud" /></g>
  <g class="c2"><use href="#pixel-cloud" /></g>
  <g class="c3"><use href="#pixel-cloud" /></g>
  <g class="c4"><use href="#pixel-cloud" /></g>

  <!-- Static background layer: Mountains -->
  <g transform="translate(-50, 150)"><g transform="scale(0.6666)"><use href="#mountain" /></g></g>
  <g transform="translate(100, 100)"><use href="#mountain" /></g>
  <g transform="translate(450, 120)"><g transform="scale(0.8666)"><use href="#mountain" /></g></g>
  <g transform="translate(700, 50)"><g transform="scale(1.3333)"><use href="#mountain" /></g></g>

  <!-- Bushes -->
  <g transform="translate(60, 200)"><use href="#bush-type1" /></g>
  
  <g transform="translate(350, 170)"><use href="#bush-tall" /></g>
  <g transform="translate(385, 200)"><use href="#bush-short" /></g>
  
  <g transform="translate(800, 200)"><use href="#bush-type1" /></g>
  <!-- Scenario Elements -->
  <!-- Left blocks -->
  <g transform="translate(150, 140)">
    <use href="#brick-block" x="0" />
    <use href="#question-block" x="32" />
    <use href="#brick-block" x="64" />
  </g>
  <use href="#coin" x="186" y="100" />

  <!-- Pipe and Piranha Plant -->
  <use href="#piranha-plant" x="466" y="140" />
  <use href="#pipe" x="450" y="184" />

  <!-- Right blocks -->
  <g transform="translate(560, 140)">
    <use href="#brick-block" x="0" />
    <use href="#question-block" x="32" />
    <use href="#question-block" x="64" />
    <use href="#question-block" x="96" />
    <use href="#brick-block" x="128" />
  </g>
  <use href="#coin" x="596" y="100" />
  <use href="#coin" x="628" y="80" />
  <use href="#coin" x="660" y="100" />

  <!-- Mushroom House -->
  <use href="#mushroom-house" x="800" y="150" />

  <!-- Top Text -->
  <text x="500" y="60" font-family="'Impact', 'Arial Black', sans-serif" font-size="28" text-anchor="middle" fill="#fff" stroke="#000" stroke-width="6" paint-order="stroke fill" letter-spacing="2">
    IT'S ME, MARIO... CREATING CODE!
  </text>

  <!-- Ground -->
  <rect x="0" y="250" width="1000" height="50" fill="url(#ground-pattern)" />
  <rect x="0" y="250" width="1000" height="2" fill="#000" />

  <!-- Bottom Texts -->
  <text x="500" y="272" font-family="'Impact', 'Arial Black', sans-serif" font-size="16" text-anchor="middle" fill="#fff" stroke="#000" stroke-width="3" paint-order="stroke fill" letter-spacing="1">
    RUNNING &amp; JUMPING THROUGH CODEBASES
  </text>
  <text x="500" y="292" font-family="'Impact', 'Arial Black', sans-serif" font-size="16" text-anchor="middle" fill="#fff" stroke="#000" stroke-width="3" paint-order="stroke fill" letter-spacing="1">
    FULL-STACK DEV | OPEN-SOURCE | GAMING
  </text>
</svg>
