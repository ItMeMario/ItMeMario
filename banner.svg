<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1232"/>
      <stop offset="20%" stop-color="#122555"/>
      <stop offset="45%" stop-color="#1e4d8c"/>
      <stop offset="65%" stop-color="#3a82c4"/>
      <stop offset="80%" stop-color="#5ba8dc"/>
      <stop offset="95%" stop-color="#7ec8eb"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes cloudDriftRight {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(20px); }
    }
    @keyframes cloudDriftLeft {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-15px); }
    }
    .cloud-back { animation: cloudDriftLeft 30s ease-in-out infinite; }
    .cloud-front { animation: cloudDriftRight 22s ease-in-out infinite; }
  </style>

  <!-- SKY -->
  <rect width="800" height="350" fill="url(#skyGradient)"/>

  <!-- BACK MOUNTAINS -->
  <g id="mountains-back">
    <path d="M-20,245 Q150,95 320,245 Z" fill="#1a5f20"/>
    <path d="M90,215 Q150,160 210,215" stroke="#22732a" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M110,195 Q150,150 190,195" stroke="#22732a" stroke-width="1.5" fill="none" opacity="0.4"/>

    <path d="M220,245 Q430,55 640,245 Z" fill="#175a1c"/>
    <path d="M320,200 Q430,120 540,200" stroke="#1f6e25" stroke-width="1.8" fill="none" opacity="0.5"/>
    <path d="M360,175 Q430,105 500,175" stroke="#1f6e25" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M390,155 Q430,95 470,155" stroke="#1f6e25" stroke-width="1.2" fill="none" opacity="0.3"/>

    <path d="M560,245 Q720,100 880,245 Z" fill="#1a5f20"/>
    <path d="M620,210 Q720,150 820,210" stroke="#22732a" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M650,190 Q720,140 790,190" stroke="#22732a" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- FRONT MOUNTAINS -->
  <g id="mountains-front">
    <path d="M-40,245 Q60,165 160,245 Z" fill="#2d8f35"/>
    <path d="M0,225 Q60,190 120,225" stroke="#35a33e" stroke-width="1.2" fill="none" opacity="0.4"/>

    <path d="M320,245 Q500,110 680,245 Z" fill="#2b8a32"/>
    <path d="M400,215 Q500,155 600,215" stroke="#35a33e" stroke-width="1.5" fill="none" opacity="0.45"/>
    <path d="M430,195 Q500,145 570,195" stroke="#35a33e" stroke-width="1.2" fill="none" opacity="0.35"/>

    <path d="M660,245 Q760,160 860,245 Z" fill="#2d8f35"/>
    <path d="M700,220 Q760,185 820,220" stroke="#35a33e" stroke-width="1.2" fill="none" opacity="0.4"/>
  </g>

  <!-- BACK CLOUDS (slower drift) -->
  <g class="cloud-back">
    <g transform="translate(100,72)">
      <ellipse cx="0" cy="6" rx="30" ry="12" fill="white" opacity="0.92"/>
      <circle cx="-14" cy="-1" r="11" fill="white" opacity="0.92"/>
      <circle cx="4" cy="-8" r="14" fill="white" opacity="0.92"/>
      <circle cx="17" cy="1" r="9" fill="white" opacity="0.92"/>
    </g>
    <g transform="translate(620,78)">
      <ellipse cx="0" cy="5" rx="28" ry="11" fill="white" opacity="0.88"/>
      <circle cx="-12" cy="0" r="10" fill="white" opacity="0.88"/>
      <circle cx="3" cy="-7" r="13" fill="white" opacity="0.88"/>
      <circle cx="15" cy="1" r="8" fill="white" opacity="0.88"/>
    </g>
  </g>

  <!-- FRONT CLOUDS (faster drift) -->
  <g class="cloud-front">
    <g transform="translate(340,42)">
      <ellipse cx="0" cy="7" rx="38" ry="15" fill="white" opacity="0.96"/>
      <circle cx="-18" cy="-1" r="14" fill="white" opacity="0.96"/>
      <circle cx="5" cy="-10" r="17" fill="white" opacity="0.96"/>
      <circle cx="22" cy="0" r="11" fill="white" opacity="0.96"/>
    </g>
    <g transform="translate(760,58)">
      <ellipse cx="0" cy="4" rx="22" ry="9" fill="white" opacity="0.9"/>
      <circle cx="-9" cy="0" r="8" fill="white" opacity="0.9"/>
      <circle cx="3" cy="-5" r="10" fill="white" opacity="0.9"/>
      <circle cx="12" cy="1" r="7" fill="white" opacity="0.9"/>
    </g>
  </g>

</svg>
